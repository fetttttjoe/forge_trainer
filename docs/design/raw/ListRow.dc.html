<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<button onClick="{{ onClick }}" style="width:100%;text-align:left;display:flex;align-items:center;gap:13px;background:var(--surface,#fff);border:1px solid var(--line,#e7e5e0);border-radius:15px;padding:12px 14px;box-shadow:var(--shadow,0 1px 2px rgba(0,0,0,.05));cursor:pointer;color:var(--ink,#1a1a1a)">
  <div style="width:40px;height:40px;border-radius:11px;background:var(--surface-2,#eee);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">{{ icon }}</div>
  <div style="flex:1;min-width:0">
    <div style="display:flex;align-items:center;gap:7px;min-width:0"><span style="font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ title }}</span><sc-if value="{{ hasBadge }}" hint-placeholder-val="{{ false }}"><span style="font-size:9px;font-weight:800;letter-spacing:.04em;padding:2px 6px;border-radius:5px;background:color-mix(in srgb, var(--accent,#EF5A2E) 14%, transparent);color:var(--accent,#EF5A2E);flex-shrink:0">{{ badge }}</span></sc-if></div>
    <div style="font-size:12px;color:var(--ink-3,#999);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ subtitle }}</div>
  </div>
  <sc-if value="{{ showChevron }}" hint-placeholder-val="{{ true }}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink-3,#999)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M9 6l6 6-6 6"/></svg></sc-if>
  <sc-if value="{{ showAdd }}" hint-placeholder-val="{{ false }}"><div style="width:30px;height:30px;border-radius:9px;background:var(--surface-2,#eee);display:flex;align-items:center;justify-content:center;color:var(--accent,#EF5A2E);flex-shrink:0"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div></sc-if>
</button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:330,&quot;height&quot;:72},&quot;icon&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;🧗&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Weighted Pull-up&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;subtitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Lats · Bodyweight&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;badge&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;action&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;chevron&quot;,&quot;add&quot;,&quot;none&quot;],&quot;default&quot;:&quot;chevron&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onClick&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const action = this.props.action || 'chevron';
    return {
      icon: this.props.icon || '🏋️', title: this.props.title || 'Title', subtitle: this.props.subtitle || '',
      badge: this.props.badge || '', hasBadge: !!this.props.badge,
      showChevron: action === 'chevron', showAdd: action === 'add',
      onClick: this.props.onClick || (() => {}),
    };
  }
}
</script>
</body>
</html>
