<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<button onClick="{{ onClick }}" style="{{ st }}">{{ label }}</button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:140,&quot;height&quot;:48},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Fingers&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;active&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;onClick&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = !!this.props.active;
    const base = { padding: '7px 14px', borderRadius: '999px', border: '1px solid', fontSize: '12.5px', fontWeight: 700, cursor: 'pointer', whiteSpace: 'nowrap', font: 'inherit' };
    return {
      label: this.props.label || 'Chip', onClick: this.props.onClick || (() => {}),
      st: active
        ? { ...base, borderColor: 'var(--ink,#1a1a1a)', background: 'var(--ink,#1a1a1a)', color: 'var(--bg,#fff)' }
        : { ...base, borderColor: 'var(--line-2,#ccc)', background: 'transparent', color: 'var(--ink-2,#555)' },
    };
  }
}
</script>
</body>
</html>
