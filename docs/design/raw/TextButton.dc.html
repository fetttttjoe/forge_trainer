<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<button onClick="{{ onClick }}" style="{{ st }}">{{ label }}</button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:120,&quot;height&quot;:48},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Save&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;plain&quot;,&quot;primary&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;plain&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;default&quot;,&quot;accent&quot;],&quot;default&quot;:&quot;default&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onClick&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const v = this.props.variant || 'plain';
    const base = { border: 'none', cursor: 'pointer', fontFamily: 'inherit', fontWeight: 700 };
    const map = {
      plain: { ...base, background: 'none', color: this.props.tone === 'accent' ? 'var(--accent,#EF5A2E)' : 'var(--ink-2,#555)', fontSize: '14px', padding: '4px 2px' },
      primary: { ...base, background: 'var(--accent,#EF5A2E)', color: '#fff', fontSize: '13px', padding: '8px 14px', borderRadius: '11px' },
      dark: { ...base, background: 'var(--ink,#1a1a1a)', color: 'var(--bg,#fff)', fontSize: '13px', padding: '9px 15px', borderRadius: '11px' },
    };
    return { label: this.props.label || 'Button', onClick: this.props.onClick || (() => {}), st: map[v] || map.plain };
  }
}
</script>
</body>
</html>
