<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<button onClick="{{ onToggle }}" style="{{ sw }}"><span style="{{ knob }}"></span></button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:80,&quot;height&quot;:48},&quot;on&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;onToggle&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const on = !!this.props.on;
    return {
      onToggle: this.props.onToggle || (() => {}),
      sw: { width: '46px', height: '28px', borderRadius: '999px', border: 'none', cursor: 'pointer', padding: '3px', display: 'flex', justifyContent: on ? 'flex-end' : 'flex-start', background: on ? 'var(--accent,#EF5A2E)' : 'var(--line-2,#ccc)' },
      knob: { width: '22px', height: '22px', borderRadius: '50%', background: '#fff', boxShadow: '0 1px 3px rgba(0,0,0,.3)' },
    };
  }
}
</script>
</body>
</html>
