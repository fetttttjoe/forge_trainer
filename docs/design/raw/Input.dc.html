<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<label style="display:block">
  <sc-if value="{{ hasLabel }}" hint-placeholder-val="{{ false }}"><span style="font-size:12px;font-weight:700;color:var(--ink-2,#555);display:block;margin-bottom:7px">{{ label }}</span></sc-if>
  <input value="{{ value }}" onChange="{{ onChange }}" placeholder="{{ placeholder }}" style="width:100%;border:1px solid var(--line,#e7e5e0);border-radius:13px;background:var(--surface,#fff);color:var(--ink,#1a1a1a);padding:13px 14px;font-size:15px;font-weight:600;outline:none;box-shadow:var(--shadow)" />
</label>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:90},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Name&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;value&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;placeholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;e.g. One-arm hang&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onChange&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(e) =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return { label: this.props.label || '', hasLabel: !!this.props.label, value: this.props.value == null ? '' : this.props.value, placeholder: this.props.placeholder || '', onChange: this.props.onChange || (() => {}) };
  }
}
</script>
</body>
</html>
