<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;gap:8px">
  <sc-for list="{{ tags }}" as="f" hint-placeholder-count="4"><button onClick="{{ f.onClick }}" style="{{ f.style }}">{{ f.label }}</button></sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:56},&quot;value&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;easy&quot;,&quot;solid&quot;,&quot;grindy&quot;,&quot;failed&quot;],&quot;default&quot;:&quot;solid&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onChange&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(v: string) =&gt; void&quot;}}">
class Component extends DCLogic {
  FELT = [['easy', 'Easy', '#17936B'], ['solid', 'Solid', 'var(--accent,#EF5A2E)'], ['grindy', 'Grindy', '#C9721F'], ['failed', 'Failed', '#C0392B']];
  renderVals() {
    const val = this.props.value; const onChange = this.props.onChange || (() => {});
    const base = { flex: 1, padding: '13px 4px', borderRadius: '13px', border: '1.5px solid', fontSize: '13px', fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' };
    return { tags: this.FELT.map(([k, label, c]) => ({ label, onClick: () => onChange(k), style: val === k ? { ...base, background: c, color: '#fff', borderColor: c } : { ...base, background: 'transparent', color: 'var(--ink-2,#555)', borderColor: 'var(--line-2,#ccc)' } })) };
  }
}
</script>
</body>
</html>
