<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:center;gap:9px;background:var(--surface,#fff);border:1px solid var(--line,#e7e5e0);border-radius:14px;padding:11px 14px;box-shadow:var(--shadow)">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink-3,#999)" stroke-width="1.9" stroke-linecap="round" style="flex-shrink:0"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/></svg>
  <input value="{{ value }}" onChange="{{ onChange }}" placeholder="{{ placeholder }}" style="flex:1;min-width:0;border:none;outline:none;background:transparent;color:var(--ink,#1a1a1a);font-size:15px" />
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:50},&quot;value&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;placeholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Search exercises…&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onChange&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(e) =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return { value: this.props.value == null ? '' : this.props.value, placeholder: this.props.placeholder || 'Search…', onChange: this.props.onChange || (() => {}) };
  }
}
</script>
</body>
</html>
