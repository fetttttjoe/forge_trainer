<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;gap:5px"><sc-for list="{{ days }}" as="d" hint-placeholder-count="7"><button onClick="{{ d.onClick }}" style="{{ d.style }}">{{ d.label }}</button></sc-for></div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:40},&quot;value&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:3,&quot;tsType&quot;:&quot;number | null&quot;},&quot;onChange&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(wd: number) =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const val = this.props.value; const onChange = this.props.onChange || (() => {});
    const base = { flex: '1', minWidth: '0', padding: '7px 0', textAlign: 'center', borderRadius: '9px', border: '1px solid', fontSize: '11.5px', fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' };
    return { days: [['Mon', 1], ['Tue', 2], ['Wed', 3], ['Thu', 4], ['Fri', 5], ['Sat', 6], ['Sun', 0]].map(([label, wd]) => ({ label, onClick: () => onChange(wd), style: val === wd ? { ...base, background: 'var(--ink,#1a1a1a)', color: 'var(--bg,#fff)', borderColor: 'var(--ink,#1a1a1a)' } : { ...base, background: 'transparent', color: 'var(--ink-2,#555)', borderColor: 'var(--line-2,#ccc)' } })) };
  }
}
</script>
</body>
</html>
