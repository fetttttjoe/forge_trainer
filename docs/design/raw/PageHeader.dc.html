<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:0 0 16px">
  <div style="min-width:0">
    <sc-if value="{{ hasKicker }}" hint-placeholder-val="{{ false }}"><div style="font-size:13px;font-weight:600;color:var(--ink-3,#999)">{{ kicker }}</div></sc-if>
    <h1 style="margin:2px 0 0;font-size:27px;font-weight:800;letter-spacing:-.025em;color:var(--ink,#1a1a1a)">{{ title }}</h1>
  </div>
  <sc-if value="{{ hasAction }}" hint-placeholder-val="{{ false }}"><button onClick="{{ onAction }}" style="flex-shrink:0;display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:12px;border:none;background:var(--accent,#EF5A2E);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font:inherit"><span style="font-size:15px;line-height:1">+</span>{{ actionLabel }}</button></sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:330,&quot;height&quot;:70},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Plans&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;kicker&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;actionLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;New&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onAction&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      title: this.props.title || 'Page', kicker: this.props.kicker || '', hasKicker: !!this.props.kicker,
      actionLabel: this.props.actionLabel || '', hasAction: !!this.props.actionLabel, onAction: this.props.onAction || (() => {}),
    };
  }
}
</script>
</body>
</html>
