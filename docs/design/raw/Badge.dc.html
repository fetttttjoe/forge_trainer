<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<span style="{{ boxStyle }}">{{ text }}</span>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:100,&quot;height&quot;:40},&quot;text&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;NEW&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;accent&quot;,&quot;good&quot;,&quot;warn&quot;,&quot;neutral&quot;],&quot;default&quot;:&quot;accent&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const tone = this.props.tone || 'accent';
    const map = {
      accent: ['color-mix(in srgb, var(--accent,#EF5A2E) 15%, transparent)', 'var(--accent,#EF5A2E)'],
      good: ['color-mix(in srgb, var(--good,#17936B) 15%, transparent)', 'var(--good,#17936B)'],
      warn: ['color-mix(in srgb, var(--warn,#C9721F) 16%, transparent)', 'var(--warn,#C9721F)'],
      neutral: ['var(--surface-2,#eee)', 'var(--ink-2,#555)'],
    };
    const [bg, fg] = map[tone] || map.accent;
    return { text: this.props.text || 'NEW', boxStyle: { display: 'inline-block', fontSize: '9px', fontWeight: 800, letterSpacing: '.05em', padding: '2px 6px', borderRadius: '5px', background: bg, color: fg } };
  }
}
</script>
</body>
</html>
