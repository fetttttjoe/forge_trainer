name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun run test

      # Runs vue-tsc again internally, but -b is incremental so it's near-free,
      # and a broken vite build fails here with its own clear signal.
      - name: Build
        run: bun run build
